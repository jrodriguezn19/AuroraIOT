name: CD - Deploy to Oracle Cloud

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Removing previous backend (only) container
        run: docker compose down --rmi 'local' backend

      - name: Add .env file from repository secrets
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Creating and starting new backend (only) container
        run: docker compose up --build -d backend

  deploy-frontend:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Nginx www
        run: |
          rm -rf ~/nginx/www/*
          cp -r frontend/dist/* ~/nginx/www/
